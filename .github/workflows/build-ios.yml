name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Check if secrets are present
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "⚠️ Warning: Code signing secrets are not configured. Building without signing."
            echo "NO_SIGN=true" >> $GITHUB_ENV
          else
            # Create temporary variables
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

            # Import certificate and provisioning profile from secrets
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

            # Create temporary keychain
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # Import certificate to keychain
            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # Apply provisioning profile
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
            echo "✅ Code signing configured successfully."
          fi

      - name: Build and Archive App
        run: |
          if [ "${{ env.NO_SIGN }}" = "true" ]; then
            # Build without signing (only compiles to check for errors)
            xcodebuild archive \
              -project SceneDepthPointCloud.xcodeproj \
              -scheme SceneDepthPointCloud \
              -configuration Release \
              -archivePath $RUNNER_TEMP/SceneDepthPointCloud.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              COMPILER_INDEX_STORE_ENABLE=NO
          else
            # Build with code signing
            xcodebuild archive \
              -project SceneDepthPointCloud.xcodeproj \
              -scheme SceneDepthPointCloud \
              -configuration Release \
              -archivePath $RUNNER_TEMP/SceneDepthPointCloud.xcarchive \
              COMPILER_INDEX_STORE_ENABLE=NO
          fi

      - name: Export IPA
        if: env.NO_SIGN != 'true'
        run: |
          # Create ExportOptions.plist
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.DEVELOPER_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.cliniboss.app</key>
                  <string>SceneDepthPointCloud Development Profile</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SceneDepthPointCloud.xcarchive \
            -exportPath $RUNNER_TEMP/build_output \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA Artifact
        if: env.NO_SIGN != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SceneDepthPointCloud-app
          path: ${{ runner.temp }}/build_output/*.ipa
          retention-days: 7
